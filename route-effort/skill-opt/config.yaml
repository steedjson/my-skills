# SkillOpt 配置：route-effort skill 训练

model:
  backend: claude_chat
  optimizer: claude-sonnet-4-20250514
  target: claude-sonnet-4-20250514
  optimizer_backend: claude_chat
  target_backend: claude_chat
  reasoning_effort: medium

train:
  num_epochs: 3
  batch_size: 20
  accumulation: 1
  seed: 42
  train_size: 40

gradient:
  minibatch_size: 5
  merge_batch_size: 5
  analyst_workers: 8
  max_analyst_rounds: 2
  failure_only: false

optimizer:
  learning_rate: 3
  min_learning_rate: 1
  lr_scheduler: cosine
  lr_control_mode: fixed
  skill_update_mode: patch
  use_slow_update: true
  slow_update_samples: 10
  use_meta_skill: true

evaluation:
  use_gate: true
  eval_test: true
  sel_env_num: 0
  test_env_num: 0

env:
  name: route_effort
  skill_init: initial_simple.md
  split_mode: split_dir
  split_dir: /Users/changsailong/.claude/skills/vlong/route-effort/skill-opt/train-data
  out_root: skillopt-out
  exec_timeout: 120
